# Redrob Hackathon — Submission Metadata
# The fields here should match what you submit via the portal at upload time.

# ============================================================================
# Team identity (PLEASE FILL IN THESE DETAILS!)
# ============================================================================
team_name: "Rishabhkhadela"  # Used in leaderboard and announcements

primary_contact:
  name: "Rishabh Khadela"
  email: "rishabhkhadela.ai@gmail.com"   # Used for all organizer communication
  phone: "+91-XXXXXXXXXX"        # Used for top-50 / top-10 outreach

team_members:
  - name: "Rishabh Khadela"
    email: "rishabhkhadela.ai@gmail.com"
    role: "ML/AI Engineer"          # Optional, e.g. "Team Lead", "Backend", "Data"

# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/Rishabhkhadela/Data_challenge"
# Required. Must be reachable. Private repos OK if you can grant organizer
# access at Stage 3.

sandbox_link: "https://github.com/Rishabhkhadela/Data_challenge"
# Required. A working hosted environment where the ranker can be run.

reproduce_command: "python rank.py --candidates ./[PUB] India_runs_data_and_ai_challenge/[PUB] India_runs_data_and_ai_challenge/India_runs_data_and_ai_challenge/candidates.jsonl --out ./team_submission.csv"
# The single command that produces team_submission.csv from candidates.jsonl.
# Should run end-to-end within 5 minutes on CPU with 16GB RAM and no network.

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Local PC"                          # Or: "AWS EC2 c5.4xlarge", "Local Linux box", etc.
  cpu_cores: 8                                  # Number of CPU cores used
  ram_gb: 16                                    # Available RAM in GB
  python_version: "3.11"                        # python --version
  os: "Windows"                                 # Or "Ubuntu 22.04 LTS", etc.
  uses_gpu_for_inference: false                 # Must be false — see compute constraints
  has_network_during_ranking: false             # Must be false — no API calls during ranking
  pre_computation_required: false               # true if you pre-compute embeddings or train models offline
  pre_computation_time_minutes: 0               # Approximate, if applicable

# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest. Stage 5 interview
# may verify these declarations against your code; declarations that contradict
# your code or your interview are flagged.
ai_tools_used:
  - "Gemini 3.5 Flash (High)"
  - "GitHub Copilot"

ai_usage_summary: |
  Used Gemini for coding assistance, refactoring, and adding specific domain-knowledge heuristics to the ranking logic. 
  Used GitHub Copilot for code completion. No candidate data was uploaded to any LLM APIs.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Composite ranking engine based on four normalized sub-scores (Skills, Experience, Career Trajectory, and Behavioral Signals).
  Heuristics-driven approach to bypass keyword stuffing (Marketing Manager traps), penalize consulting-only histories (TCS/Infosys), and reward sub-30-day notice periods and recent platform logins.
  Runs entirely on CPU in under 1 minute for 100K candidates.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: true         # Set true if you checked for honeypots (we checked for keyword-stuffing traps)
  reproduction_tested: true         # I have tested that my reproduce_command runs end-to-end
