services:
  api:
    build:
      context: .
    image: ai-hiring-intelligence:local
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    command: uvicorn ai_hiring_intelligence.api.main:app --host 0.0.0.0 --port 8000

  ui:
    build:
      context: .
    image: ai-hiring-intelligence:local
    ports:
      - "8501:8501"
    env_file:
      - .env.example
    command: streamlit run src/ai_hiring_intelligence/ui/app.py --server.address 0.0.0.0 --server.port 8501
    depends_on:
      - api

